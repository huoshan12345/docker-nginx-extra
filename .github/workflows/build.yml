name: Build
on:
  push:
    branches:
    - main
  workflow_dispatch:


env:
  NGINX_VERSION: 1.29.2
  PKG_RELEASE: 1
  ENABLED_MODULES: ndk lua subs-filter
  IMAGE_NAME: nginx-extra

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Set Environment Variables
      run: |
        echo "IMAGE_TAG=$NGINX_VERSION-$PKG_RELEASE" >> $GITHUB_ENV
        echo "IMAGE_NAME_TAG=$IMAGE_NAME:$IMAGE_TAG" >> $GITHUB_ENV

    - name: Download Dockerfile
      run: |
        curl -o Dockerfile https://raw.githubusercontent.com/nginx/docker-nginx/master/modules/Dockerfile

    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Build and push
      uses: docker/build-push-action@v6
      with:
        context: .
        push: true
        tags: ${{ env.IMAGE_NAME_TAG }}
        build-args: |
          NGINX_VERSION=${{ env.NGINX_VERSION }}
          PKG_RELEASE=${{ env.PKG_RELEASE }}
          ENABLED_MODULES=${{ env.ENABLED_MODULES }}
