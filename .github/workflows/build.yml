name: Build
on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/build.yml      
  workflow_dispatch:

env:
  NGINX_VERSION: 1.31.2 # check versions at https://github.com/nginx/pkg-oss/tags
  PKG_RELEASE: 1
  ENABLED_MODULES: ndk lua subs-filter
  IMAGE_NAME: nginx-extra
  DOCKERHUB_USERNAME: huoshan12345

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Set Environment Variables
        run: |
          echo "IMAGE_TAG=$NGINX_VERSION" >> $GITHUB_ENV

      # NOTE: The following step must be after the previous step to use the IMAGE_TAG variable
      - name: Set Environment Variables
        run: |
          echo "IMAGE_NAME_TAG=$IMAGE_NAME:$IMAGE_TAG" >> $GITHUB_ENV

      - name: Print Environment Variables
        run: |
          echo ${{ env.IMAGE_TAG }}
          echo ${{ env.IMAGE_NAME_TAG }}

      - name: Download Dockerfile
        run: |
          curl -o Dockerfile https://raw.githubusercontent.com/nginx/docker-nginx/master/modules/Dockerfile

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: |
            ${{ env.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME_TAG }}
          build-args: |
            NGINX_VERSION=${{ env.NGINX_VERSION }}
            PKG_RELEASE=${{ env.PKG_RELEASE }}
            ENABLED_MODULES=${{ env.ENABLED_MODULES }}
